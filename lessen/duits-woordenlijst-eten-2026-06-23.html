<!DOCTYPE html><html lang="nl"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;margin:0;padding:16px;color:#1f2a44;background:#fff;line-height:1.5}
h1{font-size:21px;margin:.2em 0}
.intro{color:#6b7896;font-size:14px;margin-bottom:10px}
.pick{display:flex;gap:8px;margin:10px 0 4px}
.pick button{flex:1;border:2px solid #e6ecf5;background:#fff;border-radius:10px;padding:9px;font-weight:700;cursor:pointer;font-size:14px}
.pick button.sel{border-color:#4a86e8;background:#eaf2ff;color:#4a86e8}
.bar{height:12px;background:#e6ecf5;border-radius:8px;overflow:hidden;margin:12px 0}
.bar>i{display:block;height:100%;background:linear-gradient(90deg,#4a86e8,#16a766);width:0;transition:.3s}
.meta{display:flex;justify-content:space-between;font-size:12px;color:#6b7896;margin-bottom:4px}
.card{background:#f4f7fb;border-radius:16px;padding:20px 16px;box-shadow:0 2px 10px rgba(31,42,68,.06)}
.word{font-size:26px;font-weight:800;text-align:center;margin:6px 0 14px;color:#1f2a44}
.flag{text-align:center;font-size:13px;color:#6b7896;margin-bottom:4px}
button.opt{display:block;width:100%;text-align:left;border:2px solid #e6ecf5;background:#fff;border-radius:10px;padding:11px 13px;margin:7px 0;cursor:pointer;font-size:15px}
button.opt:hover{border-color:#4a86e8}button.opt:disabled{cursor:default}
button.opt.good{border-color:#16a766;background:#e9f9f0}
button.opt.bad{border-color:#e0564a;background:#fde9e7}
.next{margin-top:10px;width:100%;border:none;background:#4a86e8;color:#fff;border-radius:10px;padding:12px;font-weight:700;font-size:15px;cursor:pointer;display:none}
.done-msg{text-align:center;background:#e9f9f0;border-radius:12px;padding:18px;color:#16a766;font-weight:700}
.again{margin-top:10px;border:none;background:#16a766;color:#fff;border-radius:10px;padding:11px 16px;font-weight:700;cursor:pointer}
</style></head><body>
<h1>🇩🇪 Duits — Woordenlijst (eten &amp; drinken)</h1>
<p class="intro">Je ziet een Duits woord. Kies de juiste Nederlandse vertaling. Je leert van Duits naar Nederlands — in jouw tempo, zo vaak als je wilt!</p>

<div class="pick">
  <button id="bA" onclick="setList('A')">Lijst A</button>
  <button id="bB" onclick="setList('B')">Lijst B</button>
  <button id="bAll" class="sel" onclick="setList('all')">Allebei</button>
</div>

<div class="meta"><span id="prog">Woord 1</span><span id="score">Goed: 0</span></div>
<div class="bar"><i id="barfill"></i></div>

<div id="quiz"></div>

<script>
var WORDS=[
{de:"der Apfel",nl:"de appel",l:"A"},{de:"der Salat",nl:"de salade",l:"A"},{de:"der Käse",nl:"de kaas",l:"A"},
{de:"der Kaffee",nl:"de koffie",l:"A"},{de:"der Löffel",nl:"de lepel",l:"A"},{de:"der Orangensaft",nl:"de sinaasappelsap",l:"A"},
{de:"der Pfannkuchen",nl:"de pannenkoek",l:"A"},{de:"der Tee",nl:"de thee",l:"A"},{de:"der Teller",nl:"het bord",l:"A"},
{de:"der Tisch",nl:"de tafel",l:"A"},{de:"der Zucker",nl:"de suiker",l:"A"},{de:"die Auswahl",nl:"de keuze",l:"A"},
{de:"die Gabel",nl:"de vork",l:"A"},{de:"die Gurke",nl:"de komkommer",l:"A"},{de:"die Kartoffel",nl:"de aardappel",l:"A"},
{de:"die Milch",nl:"de melk",l:"A"},{de:"die Nachspeise",nl:"het nagerecht",l:"A"},{de:"die Speisekarte",nl:"de menukaart",l:"A"},
{de:"die Suppe",nl:"de soep",l:"A"},{de:"die Tasse",nl:"het kopje",l:"A"},{de:"die Vorspeise",nl:"het voorgerecht",l:"A"},
{de:"das Essen",nl:"het eten",l:"A"},{de:"das Frühstück",nl:"het ontbijt",l:"A"},{de:"das Gemüse",nl:"de groente",l:"A"},
{de:"das Messer",nl:"het mes",l:"A"},{de:"das Obst",nl:"het fruit",l:"A"},{de:"das Sauerkraut",nl:"de zuurkool",l:"A"},
{de:"das Wasser",nl:"het water",l:"A"},{de:"die Pommes",nl:"de patat",l:"A"},{de:"die Süßigkeiten",nl:"de zoetigheden / het snoep",l:"A"},
{de:"naschen",nl:"snoepen",l:"A"},{de:"wählen",nl:"kiezen",l:"A"},{de:"Es hat gut geschmeckt.",nl:"Het heeft goed gesmaakt.",l:"A"},
{de:"Vielen Dank!",nl:"Bedankt!",l:"A"},
{de:"der Kühlschrank",nl:"de koelkast",l:"B"},{de:"der Schinken",nl:"de ham",l:"B"},{de:"der Honig",nl:"de honing",l:"B"},
{de:"der Apfelsaft",nl:"de appelsap",l:"B"},{de:"der Lieferservice",nl:"de bezorgdienst",l:"B"},{de:"die Birne",nl:"de peer",l:"B"},
{de:"die Butter",nl:"de boter",l:"B"},{de:"die Rechnung",nl:"de rekening",l:"B"},{de:"die Serviette",nl:"het servet",l:"B"},
{de:"die Pizzeria",nl:"de pizzeria",l:"B"},{de:"das Glas",nl:"het glas",l:"B"},{de:"das Besteck",nl:"het bestek",l:"B"},
{de:"das Fleisch",nl:"het vlees",l:"B"},{de:"das Brot",nl:"het brood",l:"B"},{de:"das Lieblingsessen",nl:"het lievelingseten",l:"B"},
{de:"die Nudeln",nl:"de pasta",l:"B"},{de:"Guten Appetit!",nl:"Eet smakelijk / Smakelijk eten!",l:"B"},{de:"sauer",nl:"zuur",l:"B"},
{de:"scharf",nl:"scherp",l:"B"},{de:"essen",nl:"eten",l:"B"},{de:"trinken",nl:"drinken",l:"B"},
{de:"bezahlen",nl:"betalen",l:"B"},{de:"die Teigwaren",nl:"de deegwaren",l:"B"}
];

var pool=[], queue=[], idx=0, score=0, curList='all';
function shuffle(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}
function setList(l){curList=l;
  document.getElementById('bA').className=l==='A'?'sel':'';
  document.getElementById('bB').className=l==='B'?'sel':'';
  document.getElementById('bAll').className=l==='all'?'sel':'';
  start();}
function start(){
  pool=WORDS.filter(function(w){return curList==='all'||w.l===curList;});
  queue=shuffle(pool.slice()); idx=0; score=0; render();
}
function render(){
  var q=document.getElementById('quiz');
  if(idx>=queue.length){
    document.getElementById('prog').textContent='Klaar!';
    document.getElementById('barfill').style.width='100%';
    q.innerHTML='<div class="done-msg">🎉 Klaar! Je had '+score+' van '+queue.length+' goed.<br>Top gedaan, Tijn!</div>'+
      '<button class="again" onclick="start()">🔄 Opnieuw oefenen</button>';
    return;
  }
  var w=queue[idx];
  document.getElementById('prog').textContent='Woord '+(idx+1)+' van '+queue.length;
  document.getElementById('score').textContent='Goed: '+score;
  document.getElementById('barfill').style.width=(idx/queue.length*100)+'%';
  var wrong=shuffle(pool.filter(function(x){return x.nl!==w.nl;}).map(function(x){return x.nl;})).slice(0,3);
  var opts=shuffle([w.nl].concat(wrong));
  var html='<div class="card"><div class="flag">Lijst '+w.l+' · wat betekent dit?</div><div class="word">'+w.de+'</div>';
  opts.forEach(function(o){html+='<button class="opt" onclick="answer(this)" data-nl="'+o.replace(/"/g,'&quot;')+'">'+o+'</button>';});
  html+='<button class="next" id="nextBtn" onclick="idx++;render();">Volgende →</button></div>';
  q.innerHTML=html;
}
function answer(btn){
  var w=queue[idx], chosen=btn.getAttribute('data-nl');
  var opts=document.querySelectorAll('.opt');
  opts.forEach(function(b){b.disabled=true; if(b.getAttribute('data-nl')===w.nl)b.classList.add('good');});
  if(chosen===w.nl) score++; else btn.classList.add('bad');
  document.getElementById('score').textContent='Goed: '+score;
  document.getElementById('nextBtn').style.display='block';
}
start();
</script></body></html>
